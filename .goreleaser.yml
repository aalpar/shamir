version: 2

builds:
  - id: shamir
    binary: shamir
    dir: ./cmd/shamir
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X main.BuildVersion={{ .Tag }}

archives:
  - id: shamir
    ids:
      - shamir
    name_template: "shamir-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  header: |
    ## Shamir {{ .Tag }}
  footer: |
    **Full Changelog**: https://github.com/aalpar/shamir/compare/{{ .PreviousTag }}...{{ .Tag }}
